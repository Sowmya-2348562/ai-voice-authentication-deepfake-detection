<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register Voice</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body style="background: linear-gradient(to right, #f2709c, #ff9472); min-height: 100vh; display: flex; align-items: center; justify-content: center;">

  <div class="bg-white p-4 rounded shadow-lg" style="width: 100%; max-width: 500px;">
    <h3 class="text-center mb-4">🎙️ Register Your Voice</h3>

    <p class="text-muted">Click record and speak clearly. Your voice will be saved as a reference.</p>

    <div class="text-center">
      <button id="startBtn" class="btn btn-primary">Start Recording</button>
      <button id="stopBtn" class="btn btn-danger" disabled>Stop & Save</button>
      <p id="status" class="mt-3 text-success fw-bold"></p>
    </div>
  </div>

  <!-- Loader -->
  <div id="loader" style="visibility:hidden; position:fixed; top:0; left:0; width:100%; height:100%; background:#00000088; z-index:9999; display:flex; justify-content:center; align-items:center;">
    <lottie-player src="{{ url_for('static', filename='lottie/speech-loader.json') }}" background="transparent" speed="1" style="width: 150px; height: 150px;" loop autoplay></lottie-player>
  </div>

  <script>
    let mediaRecorder, chunks = [];

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusText = document.getElementById("status");

    startBtn.onclick = async () => {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      chunks = [];

      mediaRecorder.ondataavailable = e => chunks.push(e.data);

      mediaRecorder.onstop = async () => {
        const blob = new Blob(chunks, { type: "audio/wav" });
        const formData = new FormData();
        formData.append("live_audio", blob, "registered_voice.wav");

        document.getElementById("loader").style.visibility = "visible";
        const res = await fetch("/register_voice", {
          method: "POST",
          body: formData
        });
        document.getElementById("loader").style.visibility = "hidden";

        if (res.ok) {
          statusText.innerText = "✅ Voice registered successfully!";
        } else {
          statusText.innerText = "❌ Failed to save voice.";
        }
      };

      mediaRecorder.start();
      statusText.innerText = "🎤 Recording...";
      startBtn.disabled = true;
      stopBtn.disabled = false;
    };

    stopBtn.onclick = () => {
      mediaRecorder.stop();
      startBtn.disabled = false;
      stopBtn.disabled = true;
    };
  </script>
</body>
</html>
