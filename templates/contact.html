<!-- contact.html -->
{% extends "base.html" %}
{% block title %}Contact Us - VoiceSecure{% endblock %}
{% block content %}
<section class="container py-5">
  <h2 class="text-center mb-4">📬 Contact Us</h2>
  <form method="post" enctype="multipart/form-data" action="/contact">
    <div class="mb-3">
      <label for="name" class="form-label">Name</label>
      <input type="text" class="form-control" id="name" name="name" required>
    </div>
    <div class="mb-3">
      <label for="message" class="form-label">Message</label>
      <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
    </div>
    <div class="mb-3">
      <label for="voice_msg" class="form-label">Optional Voice Message (.wav)</label>
      <input type="file" class="form-control" id="voice_msg" name="voice_msg" accept=".wav">
    </div>
    <button type="submit" class="btn btn-primary">Send Message</button>
  </form>
  {% if response_audio %}
<div class="mt-4">
  <h5>🎧 Audio Response</h5>
  <audio controls autoplay>
    <source src="{{ url_for('static', filename=response_audio.split('static/')[-1]) }}" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
</div>
{% endif %}

</section>
{% endblock %}
