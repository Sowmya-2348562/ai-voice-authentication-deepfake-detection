{% extends "base.html" %}
{% block title %}Dashboard - AI Voice Platform{% endblock %}
{% block content %}
<div class="container mt-4">
  <div class="alert alert-success text-center" role="alert">
    <h2 class="text-success">✅ Authentication Successful!</h2>
    {% if similarity %}
      <p>🔎 Similarity Score: <strong>{{ (similarity | float) * 100 | round(2) }}%</strong></p>
    {% endif %}
    <p>Welcome to your dashboard.</p>
    
      <a href="{{ url_for('home') }}" class="btn btn-success">Go to Home</a>
  </div>
</div>
{% endblock %}
