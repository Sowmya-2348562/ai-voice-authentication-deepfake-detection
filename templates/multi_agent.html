{% extends "base.html" %}
{% block title %}Multi-Agent - VoiceSecure{% endblock %}
{% block content %}
<div class="container mt-4">
  <h2>Multi-Agent Team</h2>
  <p>This agent aggregates insights from multiple models for broad analysis.</p>
  <form method="post">
    <div class="form-group">
      <label for="prompt">Your Query:</label>
      <textarea class="form-control" id="prompt" name="prompt" rows="3" placeholder="E.g., 'Project plan for speaker authentication'"></textarea>
    </div>
    <button type="submit" class="btn btn-success mt-2">Submit</button>
  </form>
  {% if response %}
  <div class="alert alert-info mt-4"><strong>Team Response:</strong> {{ response }}</div>
  {% endif %}
</div>
{% endblock %}
