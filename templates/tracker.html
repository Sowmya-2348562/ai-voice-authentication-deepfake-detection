<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Authentication Tracker</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body {
      padding-top: 40px;
      background-color: #f8f9fa;
    }
    .container {
      max-width: 960px;
    }
    .table-wrapper {
      overflow-x: auto;
      background: white;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="text-center mb-4">📜 Voice Authentication Logs</h2>

    <div class="d-flex justify-content-end mb-3">
      <a class="btn btn-primary" href="data:text/csv;base64,{{ csv_data }}" download="auth_logs.csv">Download CSV</a>
    </div>

    <div class="table-wrapper">
      {{ table | safe }}
    </div>
  </div>
</body>
</html>
