{% extends "base.html" %}
{% block title %}Speaker Authentication{% endblock %}
{% block content %}
<div class="container mt-4">
  <h2>Speaker Authentication</h2>
  <form method="post" enctype="multipart/form-data">
      <div class="form-group">
          <label for="threshold">Select Similarity Threshold:</label>
          <input type="range" class="form-control-range" id="threshold" name="threshold" min="0" max="1" step="0.01" value="0.85">
      </div>
      <div class="form-group form-check">
          <input type="checkbox" class="form-check-input" id="enhance_audio" name="enhance_audio">
          <label class="form-check-label" for="enhance_audio">Enhance Audio (Noise Removal)</label>
      </div>
      <div class="form-group">
          <label for="voice_file">Upload a .wav file:</label>
          <input type="file" class="form-control-file" id="voice_file" name="voice_file" accept=".wav">
      </div>
      <button type="submit" class="btn btn-primary">Authenticate</button>
  </form>
</div>
{% endblock %}
