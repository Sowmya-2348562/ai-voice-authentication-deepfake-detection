{% extends "base.html" %}
{% block title %}Chatbot - AI Voice Platform{% endblock %}
{% block content %}
<h2>Speech & Text Chatbot</h2>
<form method="post" enctype="multipart/form-data">
    <div class="form-group">
        <label for="text_prompt">Enter a text prompt:</label>
        <textarea class="form-control" id="text_prompt" name="text_prompt" rows="3" placeholder="Type your question here..."></textarea>
    </div>
    <div class="form-group">
        <label for="query_file">Or upload a voice query (.wav):</label>
        <input type="file" class="form-control-file" id="query_file" name="query_file" accept=".wav">
    </div>
    <button type="submit" class="btn btn-primary">Submit Query</button>
</form>
{% endblock %}
