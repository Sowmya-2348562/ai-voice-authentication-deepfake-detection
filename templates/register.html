<!-- ========================== register.html ========================== -->
{% extends "base.html" %}
{% block title %}Register - VoiceSecure{% endblock %}

{% block content %}
<section class="auth-section py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card border-0 shadow-lg" data-aos="zoom-in">
          <div class="card-body p-5">
            <h3 class="card-title text-center mb-4">📝 Create an Account</h3>
            <form method="POST">
              <div class="form-floating mb-3">
                <input type="text" class="form-control" id="username" name="username" placeholder="Username" required>
                <label for="username">Username</label>
              </div>
              <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" placeholder="Email" required>
                <label for="email">Email address</label>
              </div>
              <div class="form-floating mb-4">
                <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                <label for="password">Password</label>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-gradient-yellow btn-lg">Register</button>
              </div>
              <p class="text-center mt-3 small">Already have an account? <a href="{{ url_for('login') }}">Login here</a>.</p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
