{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
  <h2 class="text-white">🧠 Talk to Ollama (LLaMA2)</h2>
  <form method="POST" class="mb-4">
    <div class="form-group">
      <label for="prompt" class="text-light">Your Prompt:</label>
      <textarea name="prompt" class="form-control" rows="4" required>{{ prompt or '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary mt-2">Ask Ollama</button>
  </form>
  {% if response %}
  <div class="card text-white bg-dark p-4">
    <h5>🧠 Ollama's Response:</h5>
    <p>{{ response }}</p>
  </div>
  {% endif %}
</div>
{% endblock %}
