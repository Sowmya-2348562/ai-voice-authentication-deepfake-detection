<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Model Predictions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding: 20px; }
        .prediction-card { margin-bottom: 20px; }
        .result { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Voice Model Predictions</h1>
        
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Upload Audio File</h5>
                <form id="predictForm">
                    <div class="mb-3">
                        <input type="file" class="form-control" id="audioFile" accept="audio/*" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Get Predictions</button>
                </form>
            </div>
        </div>

        <div id="results" class="mt-4 result">
            <h3>Prediction Results</h3>
            <div id="predictionsContainer" class="row"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
    <script>
        document.getElementById('predictForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('audioFile');
            const file = fileInput.files[0];
            if (!file) return;

            // Step 1: Upload file to get features (you'll need a new endpoint for this)
            const formData = new FormData();
            formData.append('audio', file);
            const featureResponse = await fetch('/extract_features', {
                method: 'POST',
                body: formData
            });
            const featuresData = await featureResponse.json();
            if (featuresData.error) {
                alert('Error extracting features: ' + featuresData.error);
                return;
            }

            const features = featuresData.features;
            const endpoints = [
                '/predict_rf', '/predict_lstm_csv', '/predict_lstm_csv_improved',
                '/predict_cnn_combined', '/predict_cnn_lstm_combined',
                '/predict_lstm_combined', '/predict_lstm_combined_improved'
            ];

            document.getElementById('results').style.display = 'block';
            const container = document.getElementById('predictionsContainer');
            container.innerHTML = '';

            // Step 2: Call each prediction endpoint
            for (const endpoint of endpoints) {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ features })
                });
                const data = await response.json();

                const card = document.createElement('div');
                card.className = 'col-md-4 prediction-card';
                card.innerHTML = `
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">${data.model || 'Unknown Model'}</h5>
                            <p>Prediction: ${data.prediction !== undefined ? data.prediction : 'Error'}</p>
                            <p>Confidence: ${data.confidence ? (data.confidence * 100).toFixed(2) + '%' : 'N/A'}</p>
                            <p>Timestamp: ${data.timestamp || 'N/A'}</p>
                            ${data.error ? `<p class="text-danger">Error: ${data.error}</p>` : ''}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            }
        });
    </script>
</body>
</html>
